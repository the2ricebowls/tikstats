<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikWM Service - Proxy Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    
    .header h1 {
      color: #333;
      margin-bottom: 10px;
    }
    
    .header p {
      color: #666;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    .stat-card h3 {
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
    }
    
    .stat-card .value {
      font-size: 32px;
      font-weight: bold;
      color: #667eea;
    }
    
    .card {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    
    .card h2 {
      color: #333;
      margin-bottom: 20px;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    .form-group label {
      display: block;
      color: #666;
      margin-bottom: 5px;
      font-weight: 500;
    }
    
    .form-group input {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: #667eea;
      color: white;
    }
    
    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.4);
    }
    
    .btn-danger {
      background: #f56565;
      color: white;
    }
    
    .btn-danger:hover {
      background: #e53e3e;
    }
    
    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
    }
    
    .proxy-list {
      margin-top: 20px;
    }
    
    .proxy-item {
      background: #f7fafc;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid #667eea;
    }
    
    .proxy-item.disabled {
      opacity: 0.5;
      border-left-color: #cbd5e0;
    }
    
    .proxy-info {
      flex: 1;
    }
    
    .proxy-url {
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }
    
    .proxy-meta {
      font-size: 12px;
      color: #666;
    }
    
    .proxy-actions {
      display: flex;
      gap: 10px;
    }
    
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 10px;
    }
    
    .badge-success {
      background: #48bb78;
      color: white;
    }
    
    .badge-warning {
      background: #ed8936;
      color: white;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    
    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 20px;
      opacity: 0.3;
    }
    
    .alert {
      padding: 12px 16px;
      border-radius: 5px;
      margin-bottom: 15px;
      font-size: 14px;
    }
    
    .alert-success {
      background: #c6f6d5;
      color: #22543d;
      border-left: 4px solid #48bb78;
    }
    
    .alert-error {
      background: #fed7d7;
      color: #742a2a;
      border-left: 4px solid #f56565;
    }
    
    .hidden {
      display: none;
    }
    
    .loading {
      text-align: center;
      padding: 20px;
      color: #666;
    }
    
    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      
      .proxy-item {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .proxy-actions {
        margin-top: 10px;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🚀 TikWM Service - Proxy Manager</h1>
      <p>Quản lý proxy để tăng throughput. Mỗi proxy = +1 request/second</p>
    </div>
    
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <h3>Total Proxies</h3>
        <div class="value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <h3>Active Proxies</h3>
        <div class="value" id="stat-active">0</div>
      </div>
      <div class="stat-card">
        <h3>Max Throughput</h3>
        <div class="value" id="stat-throughput">1 req/s</div>
      </div>
    </div>
    
    <!-- Add Proxy Form -->
    <div class="card">
      <h2>➕ Thêm Proxy</h2>
      
      <div id="alert-container"></div>
      
      <form id="add-proxy-form">
        <div class="form-group">
          <label>Proxy URL *</label>
          <input 
            type="text" 
            id="proxy-url" 
            placeholder="http://proxy.example.com:8080 hoặc socks5://proxy.example.com:1080"
            required
          >
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>Username (optional)</label>
            <input type="text" id="proxy-username" placeholder="username">
          </div>
          
          <div class="form-group">
            <label>Password (optional)</label>
            <input type="password" id="proxy-password" placeholder="password">
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary">Thêm Proxy</button>
      </form>
    </div>
    
    <!-- Proxy List -->
    <div class="card">
      <h2>📋 Danh sách Proxy</h2>
      
      <div id="proxy-list-container">
        <div class="loading">Đang tải...</div>
      </div>
    </div>
  </div>
  
  <script>
    const API_BASE = '';
    
    // Load proxies
    async function loadProxies() {
      try {
        const response = await fetch(`${API_BASE}/api/proxies`);
        const data = await response.json();
        
        if (data.success) {
          updateStats(data);
          renderProxies(data.proxies);
        }
      } catch (error) {
        console.error('Error loading proxies:', error);
        showAlert('Không thể tải danh sách proxy', 'error');
      }
    }
    
    // Update stats
    function updateStats(data) {
      document.getElementById('stat-total').textContent = data.count;
      document.getElementById('stat-active').textContent = data.active;
      
      // Throughput = 1 (base) + số proxy active
      const throughput = 1 + data.active;
      document.getElementById('stat-throughput').textContent = `${throughput} req/s`;
    }
    
    // Render proxies
    function renderProxies(proxies) {
      const container = document.getElementById('proxy-list-container');
      
      if (proxies.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
            </svg>
            <p>Chưa có proxy nào. Thêm proxy để tăng throughput!</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = proxies.map((proxy, index) => `
        <div class="proxy-item ${proxy.enabled ? '' : 'disabled'}">
          <div class="proxy-info">
            <div class="proxy-url">
              ${proxy.url}
              <span class="badge ${proxy.enabled ? 'badge-success' : 'badge-warning'}">
                ${proxy.enabled ? 'Active' : 'Disabled'}
              </span>
            </div>
            <div class="proxy-meta">
              ${proxy.username ? `👤 ${proxy.username}` : '🔓 No auth'}
              ${proxy.lastUsed ? ` • Last used: ${new Date(proxy.lastUsed).toLocaleTimeString()}` : ''}
            </div>
          </div>
          <div class="proxy-actions">
            <button class="btn btn-primary btn-small" onclick="toggleProxy(${proxy.id})">
              ${proxy.enabled ? 'Disable' : 'Enable'}
            </button>
            <button class="btn btn-danger btn-small" onclick="deleteProxy(${proxy.id})">
              Delete
            </button>
          </div>
        </div>
      `).join('');
    }
    
    // Add proxy
    document.getElementById('add-proxy-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const url = document.getElementById('proxy-url').value;
      const username = document.getElementById('proxy-username').value;
      const password = document.getElementById('proxy-password').value;
      
      try {
        const response = await fetch(`${API_BASE}/api/proxies`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          showAlert('✅ Proxy đã được thêm thành công!', 'success');
          document.getElementById('add-proxy-form').reset();
          loadProxies();
        } else {
          showAlert(`❌ ${data.error}`, 'error');
        }
      } catch (error) {
        showAlert('❌ Không thể thêm proxy', 'error');
      }
    });
    
    // Toggle proxy
    async function toggleProxy(id) {
      try {
        const response = await fetch(`${API_BASE}/api/proxies/${id}/toggle`, {
          method: 'PATCH'
        });
        
        const data = await response.json();
        
        if (data.success) {
          loadProxies();
        }
      } catch (error) {
        showAlert('❌ Không thể toggle proxy', 'error');
      }
    }
    
    // Delete proxy
    async function deleteProxy(id) {
      if (!confirm('Bạn có chắc muốn xóa proxy này?')) return;
      
      try {
        const response = await fetch(`${API_BASE}/api/proxies/${id}`, {
          method: 'DELETE'
        });
        
        const data = await response.json();
        
        if (data.success) {
          showAlert('🗑️ Proxy đã được xóa', 'success');
          loadProxies();
        }
      } catch (error) {
        showAlert('❌ Không thể xóa proxy', 'error');
      }
    }
    
    // Show alert
    function showAlert(message, type) {
      const container = document.getElementById('alert-container');
      const alertClass = type === 'success' ? 'alert-success' : 'alert-error';
      
      container.innerHTML = `<div class="alert ${alertClass}">${message}</div>`;
      
      setTimeout(() => {
        container.innerHTML = '';
      }, 5000);
    }
    
    // Initial load
    loadProxies();
    
    // Auto refresh every 10s
    setInterval(loadProxies, 10000);
  </script>
</body>
</html>
